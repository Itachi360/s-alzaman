<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>غير متصل — أنوار العترة</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Tajawal',Arial,sans-serif;background:#011c16;color:#fbbf24;
         display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:1.5rem}
    .card{background:rgba(6,78,59,.3);border:1px solid rgba(245,158,11,.25);
          border-radius:1.25rem;padding:2.5rem 2rem;max-width:360px;width:100%}
    .icon{font-size:3.5rem;margin-bottom:1rem}
    h1{font-size:1.4rem;margin-bottom:.75rem;color:#fbbf24}
    p{color:#6ee7b7;font-size:.875rem;line-height:1.7;margin-bottom:1.5rem}
    blockquote{font-style:italic;color:#a7f3d0;border-right:3px solid #fbbf24;
               padding-right:.9rem;text-align:right;font-size:.8rem;margin-bottom:1.5rem}
    button{background:linear-gradient(135deg,#f59e0b,#d97706);color:#011c16;border:none;
           padding:.75rem 2rem;border-radius:.75rem;font-size:.95rem;font-weight:700;
           cursor:pointer;width:100%;transition:opacity .2s}
    button:active{opacity:.85}
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📴</div>
    <h1>لا يوجد اتصال بالإنترنت</h1>
    <p>تأكد من اتصالك بالشبكة ثم أعد المحاولة.</p>
    <blockquote>«العِلْمُ كَنْزٌ عَظِيمٌ لَا يَفْنَى» — الإمام علي (ع)</blockquote>
    <button onclick="location.reload()">🔄 إعادة المحاولة</button>
  </div>
</body>
</html>
